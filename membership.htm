<div class="container">
 <div class="pos-rel become-volunteers bg-orange">
  <div class="row no-gutters">
    <div class="col-12 col-lg-6 col-md-12">
      <div class="inner-form">
        <h1 class="heading-main light-mode">
          <small>Become A Member</small>
        </h1>
        <div class="form">
          <form>
            <div class="form-group">
              <label for="fullname"><strong>Full Name</strong></label>
              <input type="text" class="form-control form-light" id="fullname"/>
            </div>
            <div class="form-group">
              <label for="email"
                ><strong>Email Address</strong></label
              >
              <input
                type="email"
                class="form-control form-light"
                id="email"
              />
            </div>
            <div class="form-group">
              <label for="phone"><strong>Phone Number</strong></label>
              <input type="tel" class="form-control form-light" id="phone"/>
            </div>
            <div class="form-group">
              <label for="Address"><strong>Address</strong></label>
              <input type="text" class="form-control form-light" id="address"/>
            </div>
            <div class="form-group">
              <label for="refrence"
                ><strong>Refrence Contact</strong></label
              >
              <input
                type="tel"
                class="form-control form-light"
                id="refrence"
              />
            </div>
            <div class="form-group">
              <label for="msg"><strong>Your Comments</strong></label>
              <textarea
                class="form-control form-light"
                rows="5"
                id="msg"
              ></textarea>
            </div>
            <button type="submit" class="btn btn-outline-light mt-3">
              Send Request
            </button>
          </form>
        </div>
      </div>
    </div>
    <div class="col-12 col-lg-6 col-md-12 volunteers-img-bg"></div>
  </div>
